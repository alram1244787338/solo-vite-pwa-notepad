<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA 离线笔记本</title>
  <link rel="stylesheet" href="/src/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4f46e5">
</head>
<body>
  <div class="container">
    <header>
      <h1>PWA 离线笔记本</h1>
    </header>

    <main>
      <section class="editor">
        <input type="text" id="note-title" placeholder="笔记标题..." />
        <textarea id="note-content" placeholder="在这里写笔记..."></textarea>
        <div class="editor-actions">
          <button id="save-btn" class="btn btn-primary">保存笔记</button>
          <button id="new-btn" class="btn btn-secondary">新建</button>
        </div>
      </section>

      <section class="notes-list">
        <h2>我的笔记</h2>
        <div id="notes-container"></div>
      </section>
    </main>
  </div>

  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
